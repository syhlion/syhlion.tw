<style>
:root {
  --ground: #fbfbf9;
  --surface-1: #ffffff;
  --surface-2: #f4f5f3;
  --hairline: rgba(20, 28, 32, 0.09);
  --hairline-strong: rgba(20, 28, 32, 0.18);
  --text-1: #1d2429;
  --text-2: #4c575f;
  --text-3: #87929b;
  --accent: #0c8471;
  --accent-dim: rgba(12, 132, 113, 0.09);
  --card-shadow: 0 1px 2px rgba(16, 24, 32, 0.04);
  --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: "Noto Sans TC", "JetBrains Mono", system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

body {
  background: var(--ground);
  color: var(--text-1);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-wrap: pretty;
}

::selection { background: var(--accent-dim); color: var(--accent); }

.wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 24px 96px;
}

/* ---------- top bar ---------- */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
  border-bottom: 1px solid var(--hairline);
  margin-bottom: 64px;
}
.topbar .host {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-3);
}
.topbar .host b { color: var(--text-2); font-weight: 500; }

.lang-switch {
  display: flex;
  border: 1px solid var(--hairline-strong);
  border-radius: 6px;
  overflow: hidden;
  font-family: var(--mono);
  font-size: 12px;
}
.lang-switch button {
  appearance: none;
  border: 0;
  background: transparent;
  color: var(--text-3);
  font-family: inherit;
  font-size: inherit;
  padding: 5px 12px;
  cursor: pointer;
  transition: color 150ms ease-out, background 150ms ease-out;
}
.lang-switch button + button { border-left: 1px solid var(--hairline-strong); }
.lang-switch button:hover { color: var(--text-1); }
.lang-switch button.active { background: var(--accent-dim); color: var(--accent); }
.lang-switch button:focus-visible { outline: 1px solid var(--accent); outline-offset: -1px; }

/* ---------- hero ---------- */
.hero { margin-bottom: 80px; }
.prompt {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-3);
  margin-bottom: 16px;
}
.prompt .dollar { color: var(--accent); }
.hero h1 {
  font-family: var(--mono);
  font-size: clamp(34px, 6vw, 56px);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 8px;
}
.hero .alias { color: var(--text-3); font-weight: 400; }
.hero .tagline {
  font-size: clamp(16px, 2.4vw, 19px);
  color: var(--text-2);
  max-width: 560px;
  margin-bottom: 20px;
}
.hero .tagline em { color: var(--accent); font-style: normal; }

.motto {
  border-left: 2px solid var(--accent);
  padding: 2px 0 2px 16px;
  margin: 0 0 28px;
  font-size: 15px;
  color: var(--text-2);
}
.motto span { display: block; }

.links { display: flex; flex-wrap: wrap; gap: 10px; }
.links a {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-2);
  text-decoration: none;
  border: 1px solid var(--hairline-strong);
  border-radius: 6px;
  padding: 7px 14px;
  transition: border-color 150ms ease-out, color 150ms ease-out, transform 150ms ease-out;
}
.links a:hover {
  color: var(--accent);
  border-color: var(--accent);
  transform: translateY(-1px);
}
.links a .arrow { color: var(--text-3); margin-left: 6px; }
.links a:hover .arrow { color: var(--accent); }

/* ---------- sections ---------- */
section { margin-bottom: 72px; }
.sec-title {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-3);
  letter-spacing: 0.02em;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.sec-title::before { content: "#"; color: var(--accent); }
.sec-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--hairline);
}

/* highlights */
.hl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.hl-card {
  background: var(--surface-1);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: var(--card-shadow);
  transition: border-color 150ms ease-out;
}
.hl-card:hover { border-color: var(--hairline-strong); }
.hl-card.wide { grid-column: 1 / -1; }
.hl-card h3 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text-1);
}
.hl-card p { font-size: 14px; color: var(--text-2); }

/* experience timeline */
.job {
  position: relative;
  padding: 0 0 40px 28px;
  border-left: 1px solid var(--hairline);
}
.job:last-child { padding-bottom: 0; }
.job::before {
  content: "";
  position: absolute;
  left: -4.5px;
  top: 8px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--ground);
  border: 1.5px solid var(--text-3);
}
.job.current::before { background: var(--accent); border-color: var(--accent); }
.job-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 14px; margin-bottom: 2px; }
.job-head h3 { font-size: 18px; font-weight: 700; }
.job-role { color: var(--accent); font-size: 14px; font-weight: 500; }
.job-time {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
  margin-left: auto;
  white-space: nowrap;
}
.job-dept { font-size: 13px; color: var(--text-3); margin-bottom: 10px; }
.job ul { list-style: none; }
.job li {
  font-size: 14.5px;
  color: var(--text-2);
  padding-left: 18px;
  position: relative;
  margin-bottom: 6px;
}
.job li::before {
  content: "–";
  position: absolute;
  left: 0;
  color: var(--text-3);
}
.job li a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); }
.job li a:hover { border-bottom-style: solid; }

.phase { margin-top: 14px; padding-left: 14px; border-left: 1px solid var(--hairline-strong); }
.phase-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 12px; margin-bottom: 4px; }
.phase-note { font-size: 13px; color: var(--text-3); }
.phase .job-time { margin-left: auto; }
@media (max-width: 640px) {
  .phase .job-time { margin-left: 0; width: 100%; }
}

/* skills */
.skill-rows { display: grid; gap: 10px; }
.skill-row { display: grid; grid-template-columns: 150px 1fr; gap: 16px; align-items: baseline; }
.skill-row .label {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
  text-align: right;
}
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-family: var(--mono);
  font-size: 12.5px;
  color: var(--text-2);
  background: var(--surface-1);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  padding: 3px 10px;
  transition: color 150ms ease-out, border-color 150ms ease-out;
}
.chip:hover { color: var(--accent); border-color: var(--accent); }
.chip.hot { color: var(--accent); border-color: rgba(84, 198, 181, 0.4); background: var(--accent-dim); }

/* open source */
.repo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.repo {
  display: block;
  text-decoration: none;
  background: var(--surface-1);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: var(--card-shadow);
  transition: border-color 150ms ease-out, transform 150ms ease-out;
}
.repo:hover { border-color: var(--accent); transform: translateY(-2px); }
.repo .repo-name {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.repo .repo-name::before { content: "▸"; color: var(--accent); font-size: 12px; }
.repo p { font-size: 13.5px; color: var(--text-2); }

/* community / education */
.plain-list { list-style: none; }
.plain-list li {
  font-size: 14.5px;
  color: var(--text-2);
  padding-left: 18px;
  position: relative;
  margin-bottom: 8px;
}
.plain-list li::before { content: "–"; position: absolute; left: 0; color: var(--text-3); }
.plain-list a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); }
.plain-list a:hover { border-bottom-style: solid; }

/* footer */
footer {
  border-top: 1px solid var(--hairline);
  padding-top: 24px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
footer .cursor {
  display: inline-block;
  width: 7px;
  height: 14px;
  background: var(--accent);
  vertical-align: text-bottom;
  animation: blink 1.2s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* entry animation */
.fade-in { animation: rise 500ms cubic-bezier(0.22, 1, 0.36, 1) both; }
@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}

@media (max-width: 640px) {
  .hl-grid, .repo-grid { grid-template-columns: 1fr; }
  .skill-row { grid-template-columns: 1fr; gap: 4px; }
  .skill-row .label { text-align: left; }
  .job { padding-left: 20px; }
  .job-time { margin-left: 0; width: 100%; }
  .topbar { margin-bottom: 48px; }
}
</style>
</head>

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function render(lang) {
  const t = I18N[lang];
  document.querySelectorAll("[data-key]").forEach((el) => {
    el.textContent = t[el.dataset.key] || "";
  });

  document.getElementById("highlights").innerHTML = HIGHLIGHTS.map((h) => {
    const c = h[lang];
    return `<div class="hl-card${h.wide ? " wide" : ""}"><h3>${esc(c.t)}</h3><p>${esc(c.d)}</p></div>`;
  }).join("");

  document.getElementById("jobs").innerHTML = JOBS.map((j) => {
    const c = j[lang];
    const body = j.phases
      ? j.phases.map((p) => {
          const pc = p[lang];
          return `<div class="phase">
            <div class="phase-head">
              <span class="job-role">${esc(pc.role)}</span>
              ${pc.note ? `<span class="phase-note">${esc(pc.note)}</span>` : ""}
              <span class="job-time">${esc(p.time)}</span>
            </div>
            <ul>${pc.items.map((i) => `<li>${i}</li>`).join("")}</ul>
          </div>`;
        }).join("")
      : `<ul>${c.items.map((i) => `<li>${i}</li>`).join("")}</ul>`;
    return `<div class="job${j.current ? " current" : ""}">
      <div class="job-head">
        <h3>${esc(c.co)}</h3>
        ${c.role ? `<span class="job-role">${esc(c.role)}</span>` : ""}
        <span class="job-time">${esc(j.time)}</span>
      </div>
      ${c.dept ? `<div class="job-dept">${esc(c.dept)}</div>` : ""}
      ${body}
    </div>`;
  }).join("");

  document.getElementById("skills").innerHTML = SKILLS.map((s) =>
    `<div class="skill-row">
      <span class="label">${esc(s.label)}</span>
      <span class="chips">${s.chips.map((c) =>
        `<span class="chip${s.hot.includes(c) ? " hot" : ""}">${esc(c)}</span>`).join("")}</span>
    </div>`
  ).join("");

  document.getElementById("repos").innerHTML = REPOS.map((r) =>
    `<a class="repo" href="${r.url}" target="_blank" rel="noopener">
      <div class="repo-name">${esc(r.name)}</div>
      <p>${esc(r[lang])}</p>
    </a>`
  ).join("");

  document.getElementById("community").innerHTML = COMMUNITY.map((c) => `<li>${c[lang]}</li>`).join("");
  document.getElementById("education").innerHTML = EDUCATION.map((c) => `<li>${esc(c[lang])}</li>`).join("");

  document.getElementById("btn-zh").classList.toggle("active", lang === "zh");
  document.getElementById("btn-en").classList.toggle("active", lang === "en");
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
}

function setLang(lang) {
  try { localStorage.setItem("lang", lang); } catch (e) {}
  render(lang);
}

let saved = "zh";
try { saved = localStorage.getItem("lang") || "zh"; } catch (e) {}
render(saved === "en" ? "en" : "zh");
